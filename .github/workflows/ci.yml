name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  config-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./helper-scripts/test-config.sh

  docker-smoke:
    runs-on: ubuntu-latest
    needs: config-test
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - run: ./helper-scripts/test-server.sh
      - run: docker compose down
