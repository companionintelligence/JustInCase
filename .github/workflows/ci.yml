name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: text_utils unit tests
        run: make -C tests/unit

  config-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./helper-scripts/test-config.sh

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [unit-test, config-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build through buildx with the shared GHA cache (the llama.cpp and
      # MuPDF stages take ~20 min cold; cached they are seconds), then load
      # the image for compose to reuse.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: jic:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services (no models — degraded mode is asserted)
        run: docker compose up -d --no-build

      - name: Server tests
        run: ./helper-scripts/test-server.sh

      - name: Container logs (on failure)
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
